<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
    <title>Recipe Grocery List Generator</title>
    <link rel="stylesheet" href="css/home.css">
    <script src="modal.js" defer></script>
</head>
<body>
    <header>
        <section>
            <h1 class="title">NomNomList</h1>
            

        </section>
        
        <form id="search">
            <input type="text" class="search">
            <button type="submit"><img src="images/magnifying-glass-8079542_1280.jpg" alt="search magnifying glass"></button>
        </form>
        <div id="modal" class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true" aria-hidden="true">
            <section class="modal-content">
              <button class="close-button" aria-label="Close modal">&times;</button>
              <h2 id="modal-title">Login</h2>
              <form>
                <div class="form-group">
                  <label for="username" id="username-label">Username</label>
                  <input type="text" id="username" placeholder="Enter username" aria-labelledby="username-label" />
                </div>
                <div class="form-group">
                  <label for="password" id="password-label">Password</label>
                  <input type="password" id="password" placeholder="Enter password" aria-labelledby="password-label" />
                </div>
                <button type="submit" class="submit-button">Submit</button>
              </form>
            </section>
          </div>
        <div id="hamburger">
            <nav>
                <a href="recipes.html">All Recipes</a>
                <a href="shoppingList.html">Shopping List</a>
                <a href="weeklyMenu.html">Weekly Menu</a>
                <a href="about.html">About Us</a>     
                <button id="open-modal">Login</button>           
            </nav>
        </div>
        <div class="hero-banner"></div>
    </header>
    <main>
        <div class="shopping-list"></div>
        <div class="recipes"></div>
    </main>
    <footer>
        $copy 2025 
        <a href="facebook.com"><img src="facebook.jpeg" alt="" target="_blank"></a>
        <a href="pinterest.com"><img src="pinterest.jpeg" alt="" target="_blank"></a>
        <a href="instagram.com"><img src="instagram.jpeg" alt="" target="_blank"></a>
    </footer>
</body>
</html>
